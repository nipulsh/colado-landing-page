<!doctype html><html><head><meta charset="utf-8"><title>Colors — Paper & Ink</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);height:100%}
  .wrap{padding:18px 20px;display:grid;grid-template-columns:repeat(4,1fr);gap:10px;font-family:var(--body)}
  .sw{border:1px solid var(--hairline);border-radius:10px;overflow:hidden;background:var(--bg-elevated)}
  .chip{height:58px}
  .meta{padding:8px 10px 10px;display:flex;justify-content:space-between;align-items:baseline}
  .n{font-family:var(--body);font-size:12px;color:var(--ink)}
  .h{font-family:var(--mono);font-size:10px;color:var(--mute-soft);letter-spacing:.08em}
</style></head><body>
<div class="wrap">
  <div class="sw"><div class="chip" style="background:#F7F5F0"></div><div class="meta"><span class="n">paper</span><span class="h">#F7F5F0</span></div></div>
  <div class="sw"><div class="chip" style="background:#EFECE4"></div><div class="meta"><span class="n">paper-soft</span><span class="h">#EFECE4</span></div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><span class="n">bg-elevated</span><span class="h">#FFFFFF</span></div></div>
  <div class="sw"><div class="chip" style="background:#E5E1D6"></div><div class="meta"><span class="n">hairline</span><span class="h">#E5E1D6</span></div></div>
  <div class="sw"><div class="chip" style="background:#0E0F0C"></div><div class="meta"><span class="n" style="color:var(--ink)">ink</span><span class="h">#0E0F0C</span></div></div>
  <div class="sw"><div class="chip" style="background:#2A2B27"></div><div class="meta"><span class="n">ink-soft</span><span class="h">#2A2B27</span></div></div>
  <div class="sw"><div class="chip" style="background:#6B6C66"></div><div class="meta"><span class="n">muted</span><span class="h">#6B6C66</span></div></div>
  <div class="sw"><div class="chip" style="background:#8A8B84"></div><div class="meta"><span class="n">mute-soft</span><span class="h">#8A8B84</span></div></div>
</div></body></html>
