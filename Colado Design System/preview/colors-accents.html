<!doctype html><html><head><meta charset="utf-8"><title>Colors — Accents</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);height:100%}
  .wrap{padding:20px 22px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;font-family:var(--body)}
  .sw{border:1px solid var(--hairline);border-radius:12px;overflow:hidden;background:var(--bg-elevated)}
  .chip{height:72px;display:flex;align-items:flex-end;padding:10px;color:#fff;font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase}
  .meta{padding:9px 12px 11px;display:flex;justify-content:space-between;align-items:baseline}
  .n{font-family:var(--body);font-size:12.5px;color:var(--ink)}
  .h{font-family:var(--mono);font-size:10px;color:var(--mute-soft);letter-spacing:.08em}
  .cap{font-family:var(--mono);font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);padding:0 0 8px 2px;grid-column:1/-1}
</style></head><body>
<div class="wrap">
  <p class="cap">Punctuation · used one at a time</p>
  <div class="sw"><div class="chip" style="background:#2D5F3F">accent / do</div><div class="meta"><span class="n">accent</span><span class="h">#2D5F3F</span></div></div>
  <div class="sw"><div class="chip" style="background:#C9502E">signal · now</div><div class="meta"><span class="n">signal-priority</span><span class="h">#C9502E</span></div></div>
  <div class="sw"><div class="chip" style="background:#6B8E5A">signal · done</div><div class="meta"><span class="n">signal-done</span><span class="h">#6B8E5A</span></div></div>
  <div class="sw"><div class="chip" style="background:#E8F0EA;color:#2D5F3F">accent-soft</div><div class="meta"><span class="n">accent-soft</span><span class="h">#E8F0EA</span></div></div>
  <div class="sw"><div class="chip" style="background:#F4E6E0;color:#C9502E">priority-soft</div><div class="meta"><span class="n">priority-soft</span><span class="h">#F4E6E0</span></div></div>
  <div class="sw"><div class="chip" style="background:#EFEAE0;color:#6B6C66">hairline-soft</div><div class="meta"><span class="n">hairline-soft</span><span class="h">#EFEAE0</span></div></div>
</div></body></html>
