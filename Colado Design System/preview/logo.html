<!doctype html><html><head><meta charset="utf-8"><title>Logo & Mark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);height:100%}
  .wrap{padding:20px;display:grid;grid-template-columns:140px 1fr;gap:24px;align-items:center}
  .tile{width:96px;height:96px;border-radius:20px;background:var(--ink);display:flex;align-items:center;justify-content:center;color:var(--paper);font-family:var(--display);font-style:italic;font-size:62px;line-height:1;margin:0 auto 8px}
  .wm{font-family:"Geist",ui-sans-serif;font-weight:700;font-size:56px;letter-spacing:.02em;color:var(--ink)}
  .cap{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);text-align:center;margin-top:4px}
  .wm-row{display:flex;align-items:center;gap:16px}
  .c-tile{width:42px;height:42px;border-radius:10px;background:var(--ink);display:flex;align-items:center;justify-content:center;color:var(--paper);font-family:var(--display);font-style:italic;font-size:30px}
</style></head><body>
<div class="wrap">
  <div><div class="tile">c</div><div class="cap">Mark · favicon</div></div>
  <div>
    <div class="wm-row"><div class="c-tile">c</div><span class="wm">COLADO</span></div>
    <div class="cap" style="text-align:left;margin-top:8px">Wordmark · Geist 700 · 0.02em</div>
  </div>
</div></body></html>
