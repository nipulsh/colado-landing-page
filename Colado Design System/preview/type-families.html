<!doctype html><html><head><meta charset="utf-8"><title>Type — Font Families</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);height:100%}
  .wrap{padding:22px 28px;display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
  .card{border:1px solid var(--hairline);background:var(--bg-elevated);border-radius:10px;padding:14px 16px}
  .name{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
  .aa{color:var(--ink);line-height:1}
  .role{font-family:var(--mono);font-size:10px;color:var(--mute-soft);letter-spacing:.06em;margin-top:8px}
</style></head><body><div class="wrap">
<div class="card">
  <div class="name">Instrument Serif</div>
  <div class="aa" style="font-family:var(--display);font-size:64px">Aa<em style="font-style:italic">Aa</em></div>
  <div class="role">display · italic em = signature</div>
</div>
<div class="card">
  <div class="name">Geist</div>
  <div class="aa" style="font-family:var(--body);font-size:64px;font-weight:400">Aa<span style="font-weight:600">Aa</span></div>
  <div class="role">body · 300 / 400 / 500 / 600 / 700</div>
</div>
<div class="card">
  <div class="name">JetBrains Mono</div>
  <div class="aa" style="font-family:var(--mono);font-size:60px">Aa</div>
  <div class="role">annotator · small caps · 0.22em</div>
</div>
</div></body></html>
