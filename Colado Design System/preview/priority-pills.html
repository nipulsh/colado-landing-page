<!doctype html><html><head><meta charset="utf-8"><title>Priority Pills</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);height:100%}
  .wrap{padding:22px 28px;display:flex;flex-direction:column;gap:10px}
  .pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:9999px;font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;font-weight:600;border:1px solid transparent}
  .row{display:flex;align-items:center;gap:14px;padding:10px 0;border-top:1px solid var(--hairline)}
  .row:first-of-type{border-top:0}
  .num{font-family:var(--mono);font-size:10.5px;color:var(--mute-soft);letter-spacing:.18em;min-width:26px}
  .t{flex:1;font-size:14.5px;color:var(--ink)}
</style></head><body><div class="wrap">
  <div class="row"><span class="num">01</span><span class="t" style="font-weight:500">Reply to investor email</span><span class="pill" style="background:#C9502E;color:#fff">NOW</span></div>
  <div class="row"><span class="num">02</span><span class="t">Ship the pitch deck</span><span class="pill" style="color:var(--ink);border-color:var(--hairline)">NEXT</span></div>
  <div class="row"><span class="num">03</span><span class="t">Call the design lead</span><span class="pill" style="color:var(--ink-soft);border-color:var(--hairline)">THEN</span></div>
  <div class="row"><span class="num">04</span><span class="t">Book flight to Bangalore</span><span class="pill" style="color:var(--muted);border-color:var(--hairline)">LATER</span></div>
  <div class="row"><span class="num">05</span><span class="t">Buy groceries</span><span class="pill" style="color:var(--muted);border-color:var(--hairline)">ADMIN</span></div>
</div></body></html>
