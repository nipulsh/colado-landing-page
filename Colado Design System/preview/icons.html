<!doctype html><html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);height:100%}
  .wrap{padding:20px 26px}
  .grid{display:grid;grid-template-columns:repeat(8,1fr);gap:10px}
  .ic{aspect-ratio:1;border:1px solid var(--hairline);border-radius:10px;background:var(--bg-elevated);display:flex;align-items:center;justify-content:center;color:var(--ink)}
  .ic svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .cap{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
  .note{font-family:var(--mono);font-size:10px;color:var(--mute-soft);letter-spacing:.04em;margin-top:10px}
</style></head><body><div class="wrap">
<div class="cap">lucide-react · 2 px stroke · round caps</div>
<div class="grid">
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M5 12h14M13 5l7 7-7 7"/></svg></div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg></div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"/></svg></div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4z"/></svg></div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9"/><path d="M3 4v5h5"/></svg></div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg></div>
  <div class="ic"><svg viewBox="0 0 24 24"><path d="M18 6 6 18M6 6l12 12"/></svg></div>
  <div class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg></div>
</div>
<p class="note">arrow-right · arrow-left · check · pencil · rotate-ccw · menu · x · clock</p>
</div></body></html>
