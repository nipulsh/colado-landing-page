<!doctype html><html><head><meta charset="utf-8"><title>Hero Fog & Paper Grain</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);height:100%;position:relative;overflow:hidden}
  .fog{position:absolute;inset:0}
  .grain{position:absolute;inset:0}
  .label{position:absolute;left:24px;bottom:20px;font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
  .gloss{position:absolute;top:24px;left:24px;font-family:var(--display);font-size:40px;line-height:1.05;color:var(--ink)}
  .gloss em{font-style:italic}
  .coord{position:absolute;right:24px;top:24px;font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--mute-soft)}
</style></head><body>
<div class="fog hero-fog"></div>
<div class="grain paper-grain"></div>
<div class="gloss">Stop planning.<br><em>Start doing.</em></div>
<span class="coord">Fig. I.</span>
<span class="label">hero-fog + paper-grain · warm field</span>
</body></html>
