<!doctype html><html><head><meta charset="utf-8"><title>Specimen Card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);height:100%;display:flex;align-items:center;justify-content:center;padding:16px}
  .card{width:440px;background:#fff;border:1px solid var(--hairline);border-radius:14px;box-shadow:var(--shadow-demo);overflow:hidden;font-family:var(--body)}
  .head{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;border-bottom:1px solid var(--hairline)}
  .head-l{display:flex;align-items:center;gap:8px}
  .dot{width:6px;height:6px;border-radius:50%;background:var(--signal-priority)}
  .lbl{font-family:var(--mono);font-size:9.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--muted)}
  .folio{font-family:var(--mono);font-size:10.5px;letter-spacing:.18em;color:var(--mute-soft)}
  .row{display:grid;grid-template-columns:28px 1fr auto;gap:12px;padding:10px 14px;border-bottom:1px solid var(--hairline-soft);align-items:start}
  .row:last-of-type{border-bottom:0}
  .num{font-family:var(--mono);font-size:10px;color:var(--mute-soft);letter-spacing:.18em;padding-top:3px}
  .ttl{font-size:14.5px;color:var(--ink)}
  .ttl.top{font-weight:500}
  .tag{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;color:var(--muted);margin-top:3px}
  .pill{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;font-weight:600;padding:3px 9px;border-radius:9999px}
  .foot{display:flex;justify-content:space-between;align-items:center;padding:11px 18px;border-top:1px solid var(--hairline);background:var(--paper)}
</style></head><body>
<div class="card">
  <div class="head"><div class="head-l"><span class="dot"></span><span class="lbl">What's on your mind</span></div><span class="folio">Fig. I.a</span></div>
  <div class="row"><span class="num">01</span><div><div class="ttl top">Reply to investor email</div><div class="tag">time-sensitive · 2 min · unblocks thread</div></div><span class="pill" style="background:#C9502E;color:#fff">NOW</span></div>
  <div class="row"><span class="num">02</span><div><div class="ttl">Ship the pitch deck</div><div class="tag">deep focus · 90 min · high impact</div></div><span class="pill" style="border:1px solid var(--hairline);color:var(--ink)">NEXT</span></div>
  <div class="row"><span class="num">03</span><div><div class="ttl">Call the design lead</div><div class="tag">can wait 24 hours</div></div><span class="pill" style="border:1px solid var(--hairline);color:var(--muted)">LATER</span></div>
  <div class="foot"><span class="lbl">Prioritized by Colado · <span style="font-variant-numeric:tabular-nums">14:32 IST</span></span><span class="lbl" style="border:1px solid var(--hairline);padding:4px 10px;border-radius:9999px">↺ Reset</span></div>
</div></body></html>
