<!doctype html><html><head><meta charset="utf-8"><title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);height:100%}
  .wrap{padding:22px 28px;font-family:var(--body)}
  .row{display:grid;grid-template-columns:84px 1fr;align-items:baseline;padding:10px 0;border-top:1px solid var(--hairline)}
  .row:first-of-type{border-top:0}
  .lbl{font-family:var(--mono);font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
  .spec{font-family:var(--display);color:var(--ink);line-height:.98;letter-spacing:-.018em}
</style></head><body><div class="wrap">
<div class="row"><span class="lbl">Display XL</span><span class="spec" style="font-size:52px">Stop planning. <em>Start doing.</em></span></div>
<div class="row"><span class="lbl">Display LG</span><span class="spec" style="font-size:38px">For people <em>who make things.</em></span></div>
<div class="row"><span class="lbl">Display MD</span><span class="spec" style="font-size:26px">One quiet <em>instrument.</em></span></div>
<div class="row"><span class="lbl">Italic</span><span class="spec" style="font-size:22px;font-style:italic">“Finally, one thing to focus on.”</span></div>
</div></body></html>
