<!doctype html><html><head><meta charset="utf-8"><title>Spacing Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;background:var(--paper);height:100%}
  .wrap{padding:22px 28px}
  .row{display:grid;grid-template-columns:60px 1fr 80px;align-items:center;gap:14px;padding:6px 0}
  .k{font-family:var(--mono);font-size:10.5px;color:var(--ink);letter-spacing:.06em}
  .bar{height:10px;background:var(--ink);border-radius:2px}
  .px{font-family:var(--mono);font-size:10px;color:var(--mute-soft);text-align:right;letter-spacing:.06em}
</style></head><body><div class="wrap">
  <div class="row"><span class="k">space-1</span><span class="bar" style="width:4px"></span><span class="px">4 px</span></div>
  <div class="row"><span class="k">space-2</span><span class="bar" style="width:8px"></span><span class="px">8 px</span></div>
  <div class="row"><span class="k">space-3</span><span class="bar" style="width:12px"></span><span class="px">12 px</span></div>
  <div class="row"><span class="k">space-4</span><span class="bar" style="width:16px"></span><span class="px">16 px</span></div>
  <div class="row"><span class="k">space-5</span><span class="bar" style="width:24px"></span><span class="px">24 px</span></div>
  <div class="row"><span class="k">space-6</span><span class="bar" style="width:32px"></span><span class="px">32 px</span></div>
  <div class="row"><span class="k">space-7</span><span class="bar" style="width:48px"></span><span class="px">48 px</span></div>
  <div class="row"><span class="k">space-8</span><span class="bar" style="width:64px"></span><span class="px">64 px</span></div>
  <div class="row"><span class="k">space-9</span><span class="bar" style="width:96px"></span><span class="px">96 px</span></div>
  <div class="row"><span class="k">space-10</span><span class="bar" style="width:128px"></span><span class="px">128 px</span></div>
</div></body></html>
